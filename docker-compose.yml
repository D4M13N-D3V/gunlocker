version: '3.8'

services:
  gunlocker:
    build: .
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
    environment:
      # Admin credentials, only used on first run. Provide PB_ADMIN_PASSWORD via
      # your shell env or an (uncommitted) .env file — never hardcode it here.
      # If left unset, the container generates a strong random password and
      # prints it once in the logs on first start.
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL:-admin@gunlocker.local}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pb_data:
